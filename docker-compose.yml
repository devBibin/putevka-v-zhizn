services:
  web:
    dns:
      - 1.1.1.1
      - 8.8.8.8
    build: .
    volumes:
      - .:/app
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable}
      SECRET_KEY: ${SECRET_KEY:-local-dev-insecure-secret-key}
      RUN_BACKGROUND_WORKERS: ${RUN_BACKGROUND_WORKERS:-false}

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5433}:5432"
    healthcheck:
      test: [ "CMD-SHELL", "sh -c 'pg_isready -U \"$POSTGRES_USER\" -d \"$POSTGRES_DB\"'" ]
      interval: 5s
      timeout: 5s
      retries: 5


  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:${DOZZLE_PORT:-8080}:8080"
    environment:
      DOZZLE_LEVEL: ${DOZZLE_LEVEL:-info}
    restart: unless-stopped

volumes:
  postgres_data:

networks:
  default:
    name: putevka_app
