services:
  ai-worker:
    build:
      context: .
      dockerfile: ai_service/Dockerfile
    env_file:
      - path: .env.ai.local
        required: false
    environment:
      AI_DJANGO_BASE_URL: ${AI_DJANGO_BASE_URL:-http://web:8000}
      AI_WORKER_ID: ${AI_WORKER_ID:-ai-worker-local-1}
      AI_WORKER_POLLING_INTERVAL: ${AI_WORKER_POLLING_INTERVAL:-10}
      AI_WORKER_LEASE_SECONDS: ${AI_WORKER_LEASE_SECONDS:-900}
      OPENAI_TRANSCRIBE_CHUNK_MIN_CONCURRENCY: ${OPENAI_TRANSCRIBE_CHUNK_MIN_CONCURRENCY:-1}
      OPENAI_TRANSCRIBE_CHUNK_MAX_CONCURRENCY: ${OPENAI_TRANSCRIBE_CHUNK_MAX_CONCURRENCY:-4}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    networks:
      - putevka_app
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:${AI_DOZZLE_PORT:-8081}:8080"
    environment:
      DOZZLE_LEVEL: ${DOZZLE_LEVEL:-info}
    networks:
      - putevka_app
    restart: unless-stopped

networks:
  putevka_app:
    external: true
