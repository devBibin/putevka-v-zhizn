services:
  caddy:
    image: caddy:2
    depends_on:
      - web
    env_file:
      - .env
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/qa/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

  web:
    dns:
      - 1.1.1.1
      - 8.8.8.8
    image: ${APP_IMAGE}
    volumes:
      - ./media:/app/media
      - ./staticfiles:/app/staticfiles
      - ./logs:/app/logs
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY:-local-dev-insecure-secret-key}
      RUN_BACKGROUND_WORKERS: ${RUN_BACKGROUND_WORKERS:-false}
    restart: unless-stopped

  dozzle:
    image: amir20/dozzle:latest
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    ports:
      - "127.0.0.1:${DOZZLE_PORT:-8080}:8080"
    environment:
      DOZZLE_LEVEL: ${DOZZLE_LEVEL:-info}
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:

networks:
  default:
    name: ${QA_NETWORK_NAME:-putevka_qa}
